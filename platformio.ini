; Car Dashboard v2 — LilyGo T-Display AMOLED (ESP32-S3)
; OBD-II over BLE (ELM327 "IOS-Vlink") → LVGL dashboard

[platformio]
boards_dir = ./boards
src_dir = ./src

; FLASH = 16M, PSRAM = 8M OPI
[env:T-Display-AMOLED]
platform = espressif32
board = lilygo-t-amoled
framework = arduino
lib_deps =
    xinyuan-lilygo/LilyGo-AMOLED-Series@^1.2.3
    shaggydog/OneButton@^1.5.0
    powerbroker2/ELMDuino@^3.4.1

build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1   ; USB CDC so `Serial` works over the USB port
    -DCORE_DEBUG_LEVEL=1
